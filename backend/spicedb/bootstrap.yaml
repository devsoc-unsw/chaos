# Local SpiceDB source of truth. Restarting the `spicedb` service overwrites
# its stored schema and relationships with the contents of this file.
schema: |-

  definition user {}
  
  definition organisation {
      relation admin: user
      relation member: user
      permission manage = admin
      permission view = member + admin
  }

  definition campaign {
      relation organisation: organisation
      permission manage = organisation->admin
      permission review = organisation->member
  }

  definition application {
      relation campaign: campaign
      relation creator: user
      permission view = creator + campaign->review
      permission edit = creator
      permission review = campaign->review
  }

  definition rating {
      relation application: application
      relation creator: user
      permission edit = creator
      permission view = application->review
  }

  definition comment {
      relation application: application
      relation creator: user
      permission edit = creator
      permission view = application->review
  }

  definition offer {
      relation campaign: campaign
      relation recipient: user
      permission admin = campaign->manage
      permission view = recipient + campaign->review
  }
  

# Add initial local relationships here, one per line. Relationships created
# through the API but not listed here are removed on the next SpiceDB startup.
relationships: |-
  organisation:org-1#admin@user:alice
  organisation:org-1#member@user:bob
  campaign:campaign-1#organisation@organisation:org-1
  application:application-1#campaign@campaign:campaign-1
  application:application-1#creator@user:charlie

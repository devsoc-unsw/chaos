version: '3.8'

services:
  # db
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-chaos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chaos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # server
  backend:
    image: ghcr.io/devsoc-unsw/chaos-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/chaos
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # next.js-frontend
  frontend:
    image: ghcr.io/devsoc-unsw/chaos-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend-nextjs/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
    driver: local

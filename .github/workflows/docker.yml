name: Docker

on:
  pull_request:
    branches: [main, "renovate/*"]
  push:
    branches: ["*"]

jobs:
  build-backend:
    name: Build (Backend)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/CHAOS-224-KHAOS-rewrite' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: chaos
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GH_TOKEN }}
      - name: Setup cargo cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/server/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Setup temporary DB
        working-directory: backend
        run: |
          which sqlx || cargo install sqlx-cli --no-default-features --features native-tls,postgres
          echo "DATABASE_URL=postgres://postgres:password@localhost:5432/chaos" >> .env
          sqlx migrate run
      - name: Generate SQLx files
        working-directory: backend/server
        run: cargo sqlx prepare
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master
        with:
          install: true
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-multi-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-multi-buildx
      - name: Docker Login
        uses: docker/login-action@v2.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Build production image
        uses: docker/build-push-action@v4
        with:
          context: backend
          builder: ${{ steps.buildx.outputs.name }}
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/CHAOS-224-KHAOS-rewrite' }}
          tags: |
            ghcr.io/devsoc-unsw/chaos-backend:${{ github.sha }}
            ghcr.io/devsoc-unsw/chaos-backend:staging-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/CHAOS-224-KHAOS-rewrite' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: frontend-nextjs
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/CHAOS-224-KHAOS-rewrite' }}
          platforms: linux/amd64
          file: frontend-nextjs/Dockerfile
          tags: |
            ghcr.io/devsoc-unsw/chaos-frontend:${{ github.sha }}
            ghcr.io/devsoc-unsw/chaos-frontend:staging-latest
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    name: Deploy (CD)
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/CHAOS-224-KHAOS-rewrite' }}
    concurrency: staging
    environment:
      name: staging
      url: https://chaosstaging.devsoc.app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: devsoc-unsw/deployment
          token: ${{ secrets.GH_TOKEN }}
          ref: dev
      - name: Install yq - portable yaml processor
        uses: mikefarah/yq@v4.35.2
      - name: Update deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "CSESoc CD"
          git config user.email "technical@csesoc.org.au"
          git checkout -b update/chaos/staging/${{ github.sha }}
          yq -i '.items[0].spec.template.spec.containers[0].image = "ghcr.io/devsoc-unsw/chaos-frontend:${{ github.sha }}"' projects/chaos/staging/deploy-frontend.yml
          yq -i '.items[0].spec.template.spec.containers[0].image = "ghcr.io/devsoc-unsw/chaos-backend:${{ github.sha }}"' projects/chaos/staging/deploy-backend.yml
          git add .
          git commit -m "feat(chaos/staging): update images"
          git push -u origin update/chaos/staging/${{ github.sha }}
          gh pr create --title "feat(chaos/staging): update images" --body "Updates the images for the chaos staging deployment to commit devsoc-unsw/chaos@${{ github.sha }}." > URL
          gh pr merge $(cat URL) --squash -d
